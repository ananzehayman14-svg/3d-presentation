
<!DOCTYPE html>
<html>
  <head>
    <title>Medicinal Chemistry VR - ACh Binding</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-entity environment="preset: starry; groundColor: #000; grid: cross"></a-entity>

      <a-entity light="type: ambient; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="-1 1 1"></a-entity>

      <a-entity text="value: Acetylcholine Binding: Nicotinic vs Muscarinic; align: center; width: 6" position="0 3.5 -4"></a-entity>

      <a-entity id="nicotinic-site" position="-2 1.5 -3">
        <a-gltf-model src="1UW6.glb" scale="0.05 0.05 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-gltf-model>
        <a-text value="Nicotinic Receptor (1UW6)" position="0 -1 0" align="center" width="3"></a-text>
      </a-entity>

      <a-entity id="muscarinic-site" position="2 1.5 -3">
        <a-gltf-model src="4DAJ.glb" scale="0.05 0.05 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-gltf-model>
        <a-text value="Muscarinic Receptor (4DAJ)" position="0 -1 0" align="center" width="3"></a-text>
      </a-entity>

      <a-sphere id="ach-molecule" position="0 1.5 -3" radius="0.1" color="yellow"
                animation="property: position; from: -1.5 1.5 -2.5; to: 1.5 1.5 -2.5; dur: 4000; dir: alternate; loop: true">
        <a-text value="ACh" position="0 0.2 0" align="center" width="2" color="white"></a-text>
      </a-sphere>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor color="#FF0000"></a-cursor>
      </a-entity>
    </a-scene>
  </body>
</html>
